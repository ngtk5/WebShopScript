name: Claim Netmarble Shop rewards

on:
  workflow_dispatch:
    inputs:
      target:
        description: Reward target
        type: choice
        required: true
        default: daily
        options:
          - daily
          - weekly
          - both
  schedule:
    # Daily claim: 00:37 UTC = 09:37 JST.
    # The minute is intentionally away from the top of the hour to reduce GitHub Actions schedule delays.
    # Runs "毎日の魔法石ガチャ" every day.
    - cron: '37 0 * * *'
    # Weekly claim: Thursday 00:42 UTC = Thursday 09:42 JST.
    # The minute is intentionally away from the top of the hour to reduce GitHub Actions schedule delays.
    # Runs "ラグジュアリーガチャ" once a week.
    - cron: '42 0 * * 4'

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt in early so GitHub does not warn about Node.js 20-based actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NETMARBLE_EMAIL: ${{ secrets.NETMARBLE_EMAIL }}
      NETMARBLE_PASSWORD: ${{ secrets.NETMARBLE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore login state
        env:
          PLAYWRIGHT_STORAGE_STATE_BASE64: ${{ secrets.PLAYWRIGHT_STORAGE_STATE_BASE64 }}
        run: |
          if [ -z "$PLAYWRIGHT_STORAGE_STATE_BASE64" ]; then
            echo "No saved login state secret found. The script will try NETMARBLE_EMAIL / NETMARBLE_PASSWORD."
            exit 0
          fi
          mkdir -p storage
          printf '%s' "$PLAYWRIGHT_STORAGE_STATE_BASE64" | base64 -d > storage/state.json
          node -e "JSON.parse(require('fs').readFileSync('storage/state.json', 'utf8')); console.log('Login state restored.')"

      - name: Claim daily reward
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'daily' || inputs.target == 'both')) || (github.event_name == 'schedule' && github.event.schedule == '37 0 * * *') }}
        run: npm run claim:daily

      - name: Claim weekly reward
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'weekly' || inputs.target == 'both')) || (github.event_name == 'schedule' && github.event.schedule == '42 0 * * 4') }}
        run: npm run claim:weekly
