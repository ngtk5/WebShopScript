name: Claim Netmarble Shop rewards

on:
  workflow_dispatch:
    inputs:
      target:
        description: Reward target
        type: choice
        required: true
        default: daily
        options:
          - daily
          - weekly
          - both

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt in early so GitHub does not warn about Node.js 20-based actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NETMARBLE_EMAIL: ${{ secrets.NETMARBLE_EMAIL }}
      NETMARBLE_PASSWORD: ${{ secrets.NETMARBLE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore login state
        env:
          PLAYWRIGHT_STORAGE_STATE_BASE64: ${{ secrets.PLAYWRIGHT_STORAGE_STATE_BASE64 }}
        run: |
          if [ -z "$PLAYWRIGHT_STORAGE_STATE_BASE64" ]; then
            echo "No saved login state secret found. The script will try NETMARBLE_EMAIL / NETMARBLE_PASSWORD."
            exit 0
          fi
          mkdir -p storage
          printf '%s' "$PLAYWRIGHT_STORAGE_STATE_BASE64" | base64 -d > storage/state.json
          node -e "JSON.parse(require('fs').readFileSync('storage/state.json', 'utf8')); console.log('Login state restored.')"

      - name: Claim daily reward
        if: ${{ inputs.target == 'daily' || inputs.target == 'both' }}
        run: npm run claim:daily

      - name: Claim weekly reward
        if: ${{ inputs.target == 'weekly' || inputs.target == 'both' }}
        run: npm run claim:weekly
