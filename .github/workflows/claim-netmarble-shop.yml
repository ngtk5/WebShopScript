name: Claim Netmarble Shop rewards

on:
  workflow_dispatch:
    inputs:
      target:
        description: Reward target
        type: choice
        required: true
        default: daily
        options:
          - daily
          - weekly
          - both
  schedule:
    # GitHub Actions cron is UTC. 15:05 UTC = 00:05 JST.
    - cron: '5 15 * * *'
    # Sunday 15:10 UTC = Monday 00:10 JST.
    - cron: '10 15 * * 0'

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore login state
        env:
          PLAYWRIGHT_STORAGE_STATE_BASE64: ${{ secrets.PLAYWRIGHT_STORAGE_STATE_BASE64 }}
        run: |
          mkdir -p storage
          echo "$PLAYWRIGHT_STORAGE_STATE_BASE64" | base64 -d > storage/state.json

      - name: Claim daily reward
        if: github.event_name == 'workflow_dispatch' && (inputs.target == 'daily' || inputs.target == 'both') || github.event_name == 'schedule'
        run: npm run claim:daily

      - name: Claim weekly reward
        if: github.event_name == 'workflow_dispatch' && (inputs.target == 'weekly' || inputs.target == 'both') || github.event_name == 'schedule' && github.event.schedule == '10 15 * * 0'
        run: npm run claim:weekly
